<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Constellation d'Orion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-deep:#0a0e1a;
    --navy:#0f1526;
    --navy-light:#171f38;
    --gold:#c9a227;
    --gold-light:#e4c976;
    --gold-soft:#8c6a3f;
    --star-white:#f4f1e6;
    --olive:#6b7248;
    --olive-light:#9aa374;
    --line: rgba(201,162,39,0.18);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--navy-deep);
    color:var(--star-white);
    font-family:'Jost', sans-serif;
    font-weight:300;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  /* Champ d'étoiles ambiant */
  .sky{position:fixed; inset:0; z-index:0; pointer-events:none;}
  .sky span{
    position:absolute; width:2px; height:2px; background:var(--star-white);
    border-radius:50%; opacity:0.5; animation:twinkle 5s ease-in-out infinite;
  }
  @keyframes twinkle{0%,100%{opacity:.15;} 50%{opacity:.8;}}
  @media (prefers-reduced-motion: reduce){ .sky span{animation:none; opacity:.3;} }

  header{
    position:relative; z-index:1;
    padding: 64px 24px 40px;
    text-align:center;
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-family:'Jost', sans-serif;
    letter-spacing:0.35em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--gold-light);
    margin-bottom:18px;
  }
  h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:500;
    font-size:clamp(2.6rem, 8vw, 4.6rem);
    color:var(--star-white);
    letter-spacing:0.02em;
    line-height:1.05;
  }
  h1 em{
    font-style:italic;
    color:var(--gold-light);
  }
  .sous-titre{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1.15rem;
    color:var(--olive-light);
    margin-top:16px;
    max-width:520px;
    margin-left:auto; margin-right:auto;
  }

  /* Constellation SVG signature */
  .constellation-wrap{
    max-width:420px; margin:36px auto 8px; position:relative;
  }
  .constellation-wrap svg{ width:100%; height:auto; display:block; }
  .constellation-wrap circle.star{ fill:var(--gold-light); filter:drop-shadow(0 0 4px rgba(228,201,118,0.7)); }
  .constellation-wrap circle.star.pulse{ animation: pulse 3s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:0.6; r:3.2;} 50%{ opacity:1; r:4.4;} }
  .constellation-wrap line{ stroke:var(--gold); stroke-width:0.6; opacity:0.55; }

  .leetchi-btn{
    display:inline-flex; align-items:center; gap:10px;
    margin-top:30px;
    padding:14px 34px;
    background:linear-gradient(135deg, var(--gold-light), var(--gold));
    color:var(--navy-deep);
    text-decoration:none;
    font-family:'Jost', sans-serif;
    font-weight:600;
    letter-spacing:0.06em;
    text-transform:uppercase;
    font-size:13px;
    border-radius:2px;
    box-shadow:0 8px 24px rgba(201,162,39,0.25);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .leetchi-btn:hover{ transform:translateY(-2px); box-shadow:0 12px 30px rgba(201,162,39,0.35); }
  .leetchi-btn svg{ width:16px; height:16px; }

  main{ position:relative; z-index:1; max-width:900px; margin:0 auto; padding: 60px 20px 100px; }

  .section-title{
    display:flex; align-items:center; gap:18px;
    margin-bottom:36px;
  }
  .section-title .branche{ flex:1; height:1px; background:linear-gradient(90deg, transparent, var(--olive-light), transparent); }
  .section-title h2{
    font-family:'Cormorant Garamond', serif;
    font-weight:500; font-style:italic;
    font-size:1.7rem;
    color:var(--gold-light);
    white-space:nowrap;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:20px;
  }

  .objet{
    background:var(--navy);
    border:1px solid var(--line);
    padding:22px;
    position:relative;
    transition: border-color .25s ease, transform .25s ease;
  }
  .objet:hover{ border-color:rgba(201,162,39,0.45); transform:translateY(-3px); }
  .objet.pris{ opacity:0.55; }

  .objet .marque{
    width:8px; height:8px; border-radius:50%;
    background:var(--gold);
    display:inline-block; margin-bottom:14px;
    box-shadow:0 0 8px rgba(201,162,39,0.6);
  }
  .objet.pris .marque{ background:var(--olive-light); box-shadow:none; }

  .objet h3{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:1.35rem;
    margin-bottom:6px;
    color:var(--star-white);
  }
  .objet .prix{
    font-size:13px; color:var(--gold-soft); letter-spacing:0.04em; margin-bottom:14px;
  }
  .objet a.lien{
    font-size:12px; color:var(--olive-light); text-decoration:none; border-bottom:1px solid var(--olive);
    padding-bottom:1px;
  }
  .objet a.lien:hover{ color:var(--gold-light); border-color:var(--gold-light); }

  .objet .actions{ margin-top:18px; }
  button.reserver{
    width:100%;
    background:transparent;
    border:1px solid var(--gold-soft);
    color:var(--gold-light);
    font-family:'Jost', sans-serif;
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:11px;
    cursor:pointer;
    transition: background .2s ease, color .2s ease;
  }
  button.reserver:hover{ background:var(--gold); color:var(--navy-deep); }
  .statut-pris{
    display:flex; align-items:center; gap:8px;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    color:var(--olive-light);
    font-size:14px;
    padding:11px 0;
  }
  .statut-pris svg{ width:14px; height:14px; }

  footer{
    position:relative; z-index:1;
    text-align:center;
    padding:40px 20px 60px;
    color:var(--gold-soft);
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
  }
  footer .rameau{ margin-top:10px; opacity:0.6; }

  .loading{ text-align:center; padding:40px; color:var(--gold-soft); font-style:italic; font-family:'Cormorant Garamond',serif; }
</style>
</head>
<body>

<div class="sky" id="sky"></div>

<header>
  <div class="eyebrow">Une étoile de plus dans le ciel</div>
  <h1>La liste d'<em>Orion</em></h1>
  <p class="sous-titre">Comme le chasseur veille sur son arc dans le ciel d'hiver, entourons ce petit d'un peu d'or et d'olivier.</p>

  <div class="constellation-wrap">
    <svg viewBox="0 0 400 260" aria-hidden="true">
      <!-- Lignes de la constellation d'Orion (approximation stylisée) -->
      <line x1="120" y1="30"  x2="150" y2="70"/>
      <line x1="150" y1="70"  x2="250" y2="60"/>
      <line x1="250" y1="60"  x2="280" y2="25"/>
      <line x1="150" y1="70"  x2="170" y2="130"/>
      <line x1="250" y1="60"  x2="235" y2="130"/>
      <line x1="170" y1="130" x2="200" y2="135"/>
      <line x1="200" y1="135" x2="235" y2="130"/>
      <line x1="170" y1="130" x2="140" y2="220"/>
      <line x1="235" y1="130" x2="265" y2="215"/>
      <!-- Étoiles -->
      <circle class="star pulse" cx="120" cy="30"  r="3.5"/>
      <circle class="star" cx="280" cy="25"  r="3"/>
      <circle class="star pulse" cx="150" cy="70"  r="4"/>
      <circle class="star pulse" cx="250" cy="60"  r="4"/>
      <circle class="star" cx="170" cy="130" r="3"/>
      <circle class="star" cx="200" cy="135" r="2.6"/>
      <circle class="star" cx="235" cy="130" r="3"/>
      <circle class="star pulse" cx="140" cy="220" r="3.6"/>
      <circle class="star pulse" cx="265" cy="215" r="3.6"/>
    </svg>
  </div>

  <a class="leetchi-btn" href="https://www.leetchi.com/fr/c/naissance-orion-1237883?u=bd935c30-b5f3-4053-9b08-019f404e0119&utm_source=copylink&utm_medium=social_sharing" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2l2.4 6.6L21 11l-6.6 2.4L12 20l-2.4-6.6L3 11l6.6-2.4L12 2z"/></svg>
    Participer à la cagnotte
  </a>
</header>

<main>
  <div class="section-title">
    <div class="branche"></div>
    <h2>Les présents du ciel</h2>
    <div class="branche"></div>
  </div>

  <div id="liste" class="grid">
    <div class="loading">La liste se lève à l'horizon…</div>
  </div>
</main>

<footer>
  Avec toute notre tendresse
  <div class="rameau">✦ 🫒 ✦</div>
</footer>

<script>
  // ─── Config ──────────────────────────────────────────
  // Remplace par l'URL de ton webhook N8N, ex :
  // "https://n8n.delonca.com/webhook/liste-naissance"
  const WEBHOOK_URL = "https://n8n.delonca.com/webhook/liste-naissance";

  // Données de démonstration utilisées si le webhook n'est pas encore branché
  const DEMO = [
    { id: 1, nom: "Poussette",        lien: "#", prix: 250, reserve: false },
    { id: 2, nom: "Lit à barreaux",   lien: "#", prix: 180, reserve: true  },
    { id: 3, nom: "Baignoire bébé",   lien: "#", prix: 45,  reserve: false },
    { id: 4, nom: "Cosy auto",        lien: "#", prix: 120, reserve: false }
  ];

  // ─── Étoiles d'ambiance ──────────────────────────────
  const sky = document.getElementById('sky');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('span');
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = (Math.random() * 5) + 's';
    sky.appendChild(s);
  }

  // ─── Chargement de la liste ──────────────────────────
  const listeEl = document.getElementById('liste');

  async function chargerListe() {
    let objets;
    try {
      const res = await fetch(WEBHOOK_URL);
      if (!res.ok) throw new Error('reponse non ok');
      objets = await res.json();
    } catch (e) {
      console.warn('Webhook indisponible, affichage des données de démo.', e);
      objets = DEMO;
    }
    afficherListe(objets);
  }

  function afficherListe(objets) {
    listeEl.innerHTML = '';
    objets.forEach(obj => {
      const carte = document.createElement('div');
      carte.className = 'objet' + (obj.reserve ? ' pris' : '');
      carte.innerHTML = `
        <span class="marque"></span>
        <h3>${obj.nom}</h3>
        <div class="prix">${obj.prix} €</div>
        ${obj.lien && obj.lien !== '#' ? `<a class="lien" href="${obj.lien}" target="_blank" rel="noopener">Voir l'objet</a>` : ''}
        <div class="actions" data-id="${obj.id}">
          ${obj.reserve
            ? `<div class="statut-pris"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> Déjà offert</div>`
            : `<button class="reserver">Je l'offre</button>`
          }
        </div>
      `;
      listeEl.appendChild(carte);
    });

    listeEl.querySelectorAll('button.reserver').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = e.target.closest('.actions').dataset.id;
        reserverObjet(id, e.target.closest('.objet'));
      });
    });
  }

  async function reserverObjet(id, carteEl) {
    // Mise à jour optimiste de l'affichage
    carteEl.classList.add('pris');
    const actions = carteEl.querySelector('.actions');
    actions.innerHTML = `<div class="statut-pris"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> Déjà offert</div>`;

    try {
      await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: id, action: 'reserve' })
      });
    } catch (e) {
      console.warn('Impossible de confirmer la réservation côté serveur.', e);
    }
  }

  chargerListe();
</script>

</body>
</html>
